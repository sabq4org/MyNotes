<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>مفكرتي — MyNotes</title>
    <script>
      // Apply persisted theme before paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem('mynotes:theme');
          if (stored !== 'light' && stored !== 'dark' && stored !== 'system') {
            stored = 'system';
          }
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = stored === 'system' ? (prefersDark ? 'dark' : 'light') : stored;
          var root = document.documentElement;
          root.classList.toggle('dark', resolved === 'dark');
          root.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute(
              'content',
              resolved === 'dark' ? '#0d0d11' : '#ffffff'
            );
          }
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
